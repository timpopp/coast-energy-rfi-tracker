<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coast Energy · RFI Program Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --midnight: #051C2C;
  --midnight-80: #1a3447;
  --midnight-60: #2d4d63;
  --golden: #FFB600;
  --sunrise: #FCD757;
  --dawn: #A5B0E3;
  --sunset: #FEAD77;
  --sandstone: #F9F4E8;
  --terracotta: #DFC2AC;
  --white: #ffffff;
  --gray-50: #f8f8f6;
  --gray-100: #f0ede6;
  --gray-200: #e2ddd4;
  --gray-300: #c8c2b8;
  --gray-400: #9e9890;
  --gray-600: #6b6560;
  --gray-800: #3a3632;
  --open-bg: #FFF8E1; --open-fg: #B45309; --open-border: #FDE68A;
  --closed-bg: #ECFDF5; --closed-fg: #065F46; --closed-border: #A7F3D0;
  --overdue-bg: #FEF2F2; --overdue-fg: #991B1B; --overdue-border: #FECACA;
  --critical-bg: #FEF2F2; --critical-fg: #991B1B;
  --urgent-bg: #FFF8E1; --urgent-fg: #B45309;
  --high-bg: #FFF8E1; --high-fg: #B45309;
  --medium-bg: #ECFDF5; --medium-fg: #065F46;
  --standard-bg: #F3F4F6; --standard-fg: #374151;
  --bic-bg: #EEF2FF; --bic-fg: #3730A3; --bic-border: #C7D2FE;
  --nem-red: #DC2626;
  --shadow-sm: 0 1px 3px rgba(5,28,44,0.08), 0 1px 2px rgba(5,28,44,0.06);
  --shadow-md: 0 4px 12px rgba(5,28,44,0.12), 0 2px 4px rgba(5,28,44,0.08);
  --shadow-lg: 0 20px 40px rgba(5,28,44,0.18), 0 8px 16px rgba(5,28,44,0.12);
  --radius: 6px;
  --radius-lg: 10px;
  --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--sandstone); color: var(--midnight); font-size: 14px; line-height: 1.5; min-height: 100vh; }
/* ── Layout ── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.topbar { background: var(--midnight); display: flex; align-items: center; gap: 0; padding: 0; flex-shrink: 0; border-bottom: 2px solid var(--golden); }
.topbar-brand { display: flex; align-items: center; gap: 10px; padding: 0 24px; height: 52px; border-right: 1px solid var(--midnight-60); }
.topbar-logo { width: 28px; height: 28px; background: var(--golden); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.topbar-logo svg { width: 18px; height: 18px; }
.topbar-name { color: var(--white); font-weight: 600; font-size: 15px; letter-spacing: -0.3px; }
.topbar-sub { color: var(--dawn); font-size: 11px; margin-top: -2px; }
.topbar-nav { display: flex; align-items: center; flex: 1; height: 52px; }
.nav-btn { height: 52px; padding: 0 20px; background: none; border: none; color: var(--gray-300); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); border-bottom: 2px solid transparent; margin-bottom: -2px; letter-spacing: 0.2px; }
.nav-btn:hover { color: var(--white); }
.nav-btn.active { color: var(--golden); border-bottom-color: var(--golden); }
.topbar-right { padding: 0 20px; display: flex; align-items: center; gap: 12px; }
.countdown { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius); padding: 6px 12px; }
.countdown-label { color: var(--gray-400); font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
.countdown-days { color: var(--golden); font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
.countdown-days.urgent { color: var(--sunset); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.countdown-suffix { color: var(--gray-400); font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); border: none; }
.btn-primary { background: var(--golden); color: var(--midnight); }
.btn-primary:hover { background: var(--sunrise); }
.btn-secondary { background: transparent; color: var(--gray-300); border: 1px solid var(--midnight-60); }
.btn-secondary:hover { background: var(--midnight-80); color: var(--white); }
.btn-ghost { background: transparent; color: var(--gray-600); border: 1px solid var(--gray-200); }
.btn-ghost:hover { background: var(--gray-100); border-color: var(--gray-300); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; }
/* ── Main content ── */
.content { flex: 1; overflow: hidden; display: flex; position: relative; }
.view { display: none; flex: 1; overflow-y: auto; padding: 24px; }
.view.active { display: flex; flex-direction: column; gap: 20px; }
/* ── Dashboard ── */
.stat-strip { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
.stat-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); }
.stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--gray-600); font-weight: 500; margin-bottom: 6px; }
.stat-card .value { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--midnight); line-height: 1; }
.stat-card .value.amber { color: #B45309; }
.stat-card .value.red { color: #991B1B; }
.stat-card .value.green { color: #065F46; }
.stat-card .sub { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.dash-grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
.panel { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
.panel-header { padding: 14px 18px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.7px; font-weight: 600; color: var(--gray-600); }
.panel-body { padding: 0; }
/* Project cards */
.project-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.project-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; }
.project-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.project-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.project-card.blue::before { background: #3B82F6; }
.project-card.green::before { background: #10B981; }
.project-card.amber::before { background: var(--golden); }
.project-card.purple::before { background: #8B5CF6; }
.project-card-name { font-size: 12px; font-weight: 600; color: var(--midnight); margin-bottom: 2px; line-height: 1.3; }
.project-card-short { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gray-400); margin-bottom: 10px; }
.project-card-stats { display: flex; gap: 12px; }
.project-stat { text-align: center; }
.project-stat .n { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; line-height: 1; }
.project-stat .n.amber { color: #B45309; }
.project-stat .n.green { color: #065F46; }
.project-stat .n.red { color: #991B1B; }
.project-stat .l { font-size: 10px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; }
/* BIC leaderboard */
.bic-row { display: flex; align-items: center; gap: 12px; padding: 10px 18px; border-bottom: 1px solid var(--gray-100); }
.bic-row:last-child { border-bottom: none; }
.bic-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bic-bg); border: 1px solid var(--bic-border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--bic-fg); flex-shrink: 0; font-family: 'DM Mono', monospace; }
.bic-org { font-weight: 500; font-size: 13px; flex: 1; }
.bic-bar-wrap { width: 100px; height: 6px; background: var(--gray-100); border-radius: 3px; }
.bic-bar { height: 6px; background: var(--dawn); border-radius: 3px; transition: width 0.5s; }
.bic-count { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--midnight); min-width: 20px; text-align: right; }
/* Activity feed */
.activity-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 18px; border-bottom: 1px solid var(--gray-100); }
.activity-row:last-child { border-bottom: none; }
.activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--golden); margin-top: 5px; flex-shrink: 0; }
.activity-content { flex: 1; min-width: 0; }
.activity-rfi { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gray-400); }
.activity-text { font-size: 12px; color: var(--midnight); line-height: 1.4; }
.activity-time { font-size: 10px; color: var(--gray-400); margin-top: 1px; }
/* ── List view ── */
.filter-bar { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; box-shadow: var(--shadow-sm); }
.filter-bar input[type="text"] { flex: 1; min-width: 200px; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 7px 10px 7px 32px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--midnight); background: var(--gray-50) url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='6' cy='6' r='4.5' stroke='%239e9890' stroke-width='1.5'/%3E%3Cpath d='M10 10L12 12' stroke='%239e9890' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat 10px center; }
.filter-bar input:focus { outline: none; border-color: var(--dawn); box-shadow: 0 0 0 3px rgba(165,176,227,0.15); }
.filter-bar select { border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--midnight); background: var(--gray-50); cursor: pointer; }
.filter-bar select:focus { outline: none; border-color: var(--dawn); }
.filter-divider { width: 1px; height: 24px; background: var(--gray-200); }
.list-meta { display: flex; align-items: center; justify-content: space-between; }
.list-meta-count { font-size: 12px; color: var(--gray-600); }
/* Table */
.rfi-table-wrap { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
.rfi-table { width: 100%; border-collapse: collapse; }
.rfi-table thead th { background: var(--midnight); color: var(--gray-300); font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; padding: 10px 14px; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 1; }
.rfi-table thead th:hover { color: var(--white); }
.rfi-table thead th.sorted { color: var(--golden); }
.rfi-table tbody tr { border-bottom: 1px solid var(--gray-100); cursor: pointer; transition: background var(--transition); }
.rfi-table tbody tr:hover { background: var(--sandstone); }
.rfi-table tbody tr.selected { background: #EEF2FF; }
.rfi-table tbody tr.critical-row { border-left: 3px solid var(--nem-red); }
.rfi-table tbody tr.overdue-row { border-left: 3px solid #DC2626; }
.rfi-table td { padding: 10px 14px; font-size: 13px; vertical-align: middle; }
.rfi-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--midnight); font-weight: 500; white-space: nowrap; }
.rfi-rev { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gray-400); background: var(--gray-100); padding: 1px 5px; border-radius: 3px; }
.rfi-title { font-weight: 500; color: var(--midnight); max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rfi-project { font-size: 11px; color: var(--gray-600); }
/* Badges */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; white-space: nowrap; border: 1px solid transparent; }
.badge-open { background: var(--open-bg); color: var(--open-fg); border-color: var(--open-border); }
.badge-closed { background: var(--closed-bg); color: var(--closed-fg); border-color: var(--closed-border); }
.badge-overdue { background: var(--overdue-bg); color: var(--overdue-fg); border-color: var(--overdue-border); }
.badge-critical { background: var(--critical-bg); color: var(--critical-fg); }
.badge-urgent, .badge-high { background: var(--urgent-bg); color: var(--urgent-fg); }
.badge-medium { background: var(--medium-bg); color: var(--medium-fg); }
.badge-standard, .badge-low { background: var(--standard-bg); color: var(--standard-fg); }
.badge-yes-cost { background: #FEF2F2; color: #991B1B; }
.badge-yes-sched { background: #FEF2F2; color: #991B1B; font-weight: 700; }
.badge-no { background: #F0FDF4; color: #166534; }
.badge-tbd, .badge-unknown { background: #F3F4F6; color: #374151; }
.badge-nem { background: #DC2626; color: #fff; font-size: 9px; letter-spacing: 0.5px; }
.bic-cell { display: flex; align-items: center; gap: 6px; }
.bic-cell-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--bic-bg); border: 1px solid var(--bic-border); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: var(--bic-fg); flex-shrink: 0; font-family: 'DM Mono', monospace; }
.bic-cell-name { font-size: 12px; font-weight: 600; color: var(--bic-fg); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.days-cell { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
.days-cell.ok { color: var(--gray-600); }
.days-cell.warn { color: #B45309; }
.days-cell.alert { color: #991B1B; font-weight: 700; }
/* ── Detail Drawer ── */
.drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(5,28,44,0.3); z-index: 100; }
.drawer-overlay.open { display: block; }
.drawer { position: fixed; right: 0; top: 52px; bottom: 0; width: 620px; background: var(--white); box-shadow: var(--shadow-lg); z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
.drawer.open { transform: translateX(0); }
.drawer-header { background: var(--midnight); padding: 20px 24px 16px; flex-shrink: 0; }
.drawer-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.drawer-rfi-num { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--golden); }
.drawer-close { background: none; border: none; color: var(--gray-400); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 18px; line-height: 1; transition: var(--transition); }
.drawer-close:hover { color: var(--white); background: var(--midnight-80); }
.drawer-title { color: var(--white); font-size: 15px; font-weight: 500; line-height: 1.4; margin-bottom: 10px; }
.drawer-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.drawer-project { font-size: 11px; color: var(--dawn); letter-spacing: 0.3px; }
.drawer-body { flex: 1; overflow-y: auto; }
.drawer-section { padding: 18px 24px; border-bottom: 1px solid var(--gray-100); }
.drawer-section:last-child { border-bottom: none; }
.section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; color: var(--gray-400); margin-bottom: 12px; }
/* BIC block */
.bic-block { background: var(--bic-bg); border: 1px solid var(--bic-border); border-radius: var(--radius-lg); padding: 14px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.bic-block-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--dawn); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--midnight); flex-shrink: 0; font-family: 'DM Mono', monospace; border: 2px solid rgba(165,176,227,0.5); }
.bic-block-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--bic-fg); font-weight: 600; margin-bottom: 2px; }
.bic-block-name { font-size: 16px; font-weight: 600; color: var(--midnight); }
.bic-block-person { font-size: 12px; color: var(--gray-600); margin-top: 1px; }
/* Fields grid */
.fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field { }
.field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--gray-400); font-weight: 600; margin-bottom: 3px; }
.field-value { font-size: 13px; color: var(--midnight); font-weight: 500; }
.field-value.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
.field-value.muted { color: var(--gray-600); font-weight: 400; }
/* Timeline */
.timeline { display: flex; flex-direction: column; gap: 0; }
.timeline-item { display: flex; gap: 12px; padding-bottom: 16px; position: relative; }
.timeline-item:last-child { padding-bottom: 0; }
.timeline-left { display: flex; flex-direction: column; align-items: center; width: 24px; flex-shrink: 0; }
.timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--golden); border: 2px solid var(--white); box-shadow: 0 0 0 2px var(--golden); flex-shrink: 0; margin-top: 4px; }
.timeline-dot.closed { background: #10B981; box-shadow: 0 0 0 2px #10B981; }
.timeline-dot.submitted { background: var(--dawn); box-shadow: 0 0 0 2px var(--dawn); }
.timeline-dot.revised { background: var(--sunset); box-shadow: 0 0 0 2px var(--sunset); }
.timeline-dot.escalated { background: #DC2626; box-shadow: 0 0 0 2px #DC2626; }
.timeline-line { flex: 1; width: 1px; background: var(--gray-200); margin-top: 4px; }
.timeline-content { flex: 1; min-width: 0; padding-top: 1px; }
.timeline-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.timeline-action { font-size: 11px; font-weight: 700; color: var(--midnight); text-transform: uppercase; letter-spacing: 0.5px; }
.timeline-actor { font-size: 11px; color: var(--gray-600); }
.timeline-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gray-400); margin-left: auto; }
.timeline-note { font-size: 12px; color: var(--gray-800); line-height: 1.5; }
.add-update-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--bic-fg); font-weight: 500; background: none; border: 1px dashed var(--bic-border); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; transition: var(--transition); margin-top: 10px; }
.add-update-btn:hover { background: var(--bic-bg); }
.update-form { margin-top: 12px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 14px; display: none; }
.update-form.open { display: block; }
.update-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.update-form select, .update-form input, .update-form textarea { width: 100%; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; background: var(--white); color: var(--midnight); }
.update-form textarea { resize: vertical; min-height: 60px; margin-bottom: 8px; }
/* Content blocks */
.content-block { margin-bottom: 14px; }
.content-block-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--gray-400); font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.content-block-text { font-size: 13px; color: var(--midnight); line-height: 1.6; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 10px 12px; }
.content-block-text.empty { color: var(--gray-400); font-style: italic; }
.impact-badges { display: flex; gap: 8px; flex-wrap: wrap; }
/* Drawer footer */
.drawer-footer { border-top: 1px solid var(--gray-200); padding: 14px 24px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; background: var(--gray-50); }
/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(5,28,44,0.5); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: var(--radius-lg); width: 680px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
.modal-header { background: var(--midnight); padding: 18px 24px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-title { color: var(--white); font-size: 15px; font-weight: 600; }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 24px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { }
.form-group.full { grid-column: 1 / -1; }

.form-label .req { color: #DC2626; }
.form-input { width: 100%; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 8px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--midnight); background: var(--white); transition: var(--transition); }
.form-input:focus { outline: none; border-color: var(--dawn); box-shadow: 0 0 0 3px rgba(165,176,227,0.2); }
.form-input.error { border-color: #DC2626; }
textarea.form-input { resize: vertical; min-height: 80px; line-height: 1.5; }
/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--midnight); color: var(--white); padding: 10px 16px; border-radius: var(--radius); font-size: 13px; box-shadow: var(--shadow-md); z-index: 999; opacity: 0; transform: translateY(10px); transition: all 0.2s; pointer-events: none; display: flex; align-items: center; gap: 8px; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--golden); }
/* Empty state */
.empty-state { text-align: center; padding: 48px 24px; color: var(--gray-400); }
.empty-state-icon { font-size: 32px; margin-bottom: 12px; }
.empty-state-text { font-size: 14px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; }
.empty-state-sub { font-size: 12px; }
/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#051C2C" stroke-width="2"/><path d="M9 4v5l3 2" stroke="#051C2C" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div>
        <div class="topbar-name">Coast Energy</div>
        <div class="topbar-sub">BMR Program · RFI Tracker</div>
      </div>
    </div>
    <div class="topbar-nav">
      <button class="nav-btn active" onclick="showView('dashboard')">Dashboard</button>

      <div class="countdown">
        <div>

          <div class="countdown-suffix">deadline</div>
        </div>
        <div class="countdown-days" id="countdown-val">—</div>
        <div class="countdown-suffix">days</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ New RFI</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">
    <!-- DASHBOARD VIEW -->
    <div class="view active" id="view-dashboard">
      <div class="stat-strip" id="stat-strip"></div>
      <div class="project-cards" id="project-cards"></div>
      <div class="dash-grid-3">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">NEM 2.0 Risk Items — Open + Schedule Impact</span>
            <span class="badge badge-overdue" id="nem-count-badge"></span>
          </div>
          <div class="panel-body" id="nem-risk-list"></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Ball in Court — Open Items</span></div>
          <div class="panel-body" id="bic-leaderboard"></div>
        </div>
      </div>
    </div>

    <!-- LIST VIEW -->
    <div class="view" id="view-list">
      <div class="filter-bar">
        <input type="text" id="search" placeholder="Search RFI #, title, description…" oninput="renderTable()">
        <select id="f-project" onchange="renderTable()">
          <option value="">All Projects</option>
          <option>Berkshire Iron Point</option>
          <option>BMR-PRC Newark</option>
          <option>AMLI Via Marina (MDR)</option>
          <option>AMLI Broadway (Long Beach)</option>
        </select>
        <select id="f-status" onchange="renderTable()">
          <option value="">All Status</option>
          <option>Open</option><option>Closed</option><option>Overdue</option>
        </select>
        <select id="f-priority" onchange="renderTable()">
          <option value="">All Priority</option>
          <option>Critical</option><option>Urgent</option><option>High</option>
          <option>Medium</option><option>Standard</option>
        </select>
        <select id="f-discipline" onchange="renderTable()">
          <option value="">All Disciplines</option>
          <option>Electrical</option><option>Structural</option><option>Civil</option><option>General</option>
        </select>
        <select id="f-sched" onchange="renderTable()">
          <option value="">Sched Impact: All</option>
          <option value="Yes">Schedule Impact: Yes</option>
        </select>
        <div class="filter-divider"></div>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()">↓ CSV</button>
      </div>
      <div class="list-meta">
        <span class="list-meta-count" id="list-count"></span>
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ New RFI</button>
      </div>
      <div class="rfi-table-wrap">
        <table class="rfi-table">
          <thead>
            <tr>
              <th onclick="sortTable('num')">RFI #</th>
              <th onclick="sortTable('project')">Project</th>
              <th onclick="sortTable('subject')">Subject</th>
              <th onclick="sortTable('discipline')">Discipline</th>
              <th onclick="sortTable('priority')">Priority</th>
              <th onclick="sortTable('status')">Status</th>
              <th onclick="sortTable('bic')">Ball in Court</th>
              <th onclick="sortTable('dateReq')">Due</th>
              <th onclick="sortTable('daysOpen')">Days Open</th>
              <th>Impact</th>

          </thead>
          <tbody id="rfi-tbody"></tbody>
        </table>
      </div>

            <select class="form-input" id="m-disc">
              <option>Electrical</option><option>Structural</option>
              <option>Civil</option><option>Mechanical</option><option>General</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select class="form-input" id="m-priority">
              <option>Critical</option><option>Urgent</option><option>High</option>
              <option>Medium</option><option>Standard</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-input" id="m-status">
              <option>Open</option><option>Closed</option><option>Overdue</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Ball in Court <span class="req">*</span></label>
            <input class="form-input" id="m-bic" placeholder="Company / Person">
          </div>
          <div class="form-group">
            <label class="form-label">Submitted By</label>
            <input class="form-input" id="m-submittedBy" placeholder="Company - Name">
          </div>
          <div class="form-group">
            <label class="form-label">Directed To</label>
            <input class="form-input" id="m-directedTo" placeholder="Company - Name">
          </div>
          <div class="form-group">
            <label class="form-label">Date Submitted</label>
            <input class="form-input" type="date" id="m-dateSub">
          </div>
          <div class="form-group">
            <label class="form-label">Date Required</label>
            <input class="form-input" type="date" id="m-dateReq">
          </div>
          <div class="form-group full">
            <label class="form-label">Subject / Title <span class="req">*</span></label>
            <input class="form-input" id="m-subject" placeholder="Brief descriptive title">
          </div>
          <div class="form-group full">
            <label class="form-label">Problem Description</label>
            <textarea class="form-input" id="m-problem" rows="4" placeholder="Describe the issue, discrepancy, or information needed…"></textarea>
          </div>
          <div class="form-group full">
            <label class="form-label">Proposed Resolution / Response</label>
            <textarea class="form-input" id="m-resolution" rows="3" placeholder="Response or proposed resolution…"></textarea>

            <label class="form-label">Plan Revision Required?</label>
            <select class="form-input" id="m-planRev">
              <option>No</option><option>Yes</option><option>TBD</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Cost Impact</label>
            <select class="form-input" id="m-costImp">
              <option>No</option><option>Yes</option><option>TBD</option><option>Unknown</option>
            </select>
          </div>

            <select class="form-input" id="m-schedImp">
              <option>No</option><option>Yes</option><option>TBD</option><option>Unknown</option>
            </select>

            <label class="form-label">Drawing / Spec Ref</label>
            <input class="form-input" id="m-drawRef" placeholder="e.g. E-3.0, S2.1">
          </div>
        </div>

        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveRFI()">Save RFI</button>
      </div>
    </div>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────────────────────
let DATA = JSON.parse(localStorage.getItem('ce_rfis') || 'null') || SEED;
let sortField = 'dateSub', sortDir = -1, selectedId = null, editId = null;

function save() { localStorage.setItem('ce_rfis', JSON.stringify(DATA)); }

// ── Helpers ────────────────────────────────────────────────────────────────────
function nem() {
  const d = new Date('2026-04-14');
  const now = new Date();
  return Math.ceil((d - now) / 86400000);
}

function daysOpen(r) {
  if (r.status === 'Closed') return null;
  if (!r.dateSub) return null;
  const s = new Date(r.dateSub);
  const e = r.dateResp ? new Date(r.dateResp) : new Date();
  return Math.floor((e - s) / 86400000);
}

function initials(str) {
  return str.split(/[\s\/\-]+/).slice(0,2).map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function statusBadge(s) {
  const cls = s.toLowerCase();
  return `<span class="badge badge-${cls}">${s}</span>`;
}

function priBadge(p) {
  const cls = p.toLowerCase();
  return `<span class="badge badge-${cls}">${p}</span>`;
}

function impBadge(v, type) {
  if (!v || v === '—') return `<span class="badge badge-tbd">—</span>`;
  const v2 = v.toLowerCase();
  if (v2 === 'yes') return `<span class="badge badge-yes-${type}">⚠ ${v}</span>`;
  if (v2 === 'no') return `<span class="badge badge-no">${v}</span>`;
  return `<span class="badge badge-tbd">${v}</span>`;
}

function autoOverdue(r) {
  if (r.status === 'Closed') return r;
  if (r.dateReq && r.dateReq !== 'ASAP' && !r.dateResp) {
    const req = new Date(r.dateReq);
    if (req < new Date()) r.status = 'Overdue';
  }
  return r;
}

function filteredData() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const fp = document.getElementById('f-project')?.value || '';
  const fs = document.getElementById('f-status')?.value || '';
  const fpr = document.getElementById('f-priority')?.value || '';
  const fd = document.getElementById('f-discipline')?.value || '';
  const fsc = document.getElementById('f-sched')?.value || '';

  return DATA.map(autoOverdue).filter(r => {
    if (fp && r.project !== fp) return false;
    if (fs && r.status !== fs) return false;
    if (fpr && r.priority !== fpr) return false;
    if (fd && r.disc !== fd) return false;
    if (fsc && r.schedImp !== fsc) return false;
    if (q && !`${r.num} ${r.subject} ${r.problem} ${r.bic} ${r.site}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a, b) => {
    let va = a[sortField] || '', vb = b[sortField] || '';
    if (sortField === 'daysOpen') { va = daysOpen(a) || 0; vb = daysOpen(b) || 0; return (va - vb) * sortDir; }
    return String(va).localeCompare(String(vb)) * sortDir;
  });
}

// ── Views ──────────────────────────────────────────────────────────────────────
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(el => {
    if (el.textContent.toLowerCase().includes(v === 'list' ? 'rfi' : v)) el.classList.add('active');
  });
  if (v === 'dashboard') renderDashboard();
  if (v === 'list') renderTable();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const all = DATA.map(autoOverdue);
  const open = all.filter(r => r.status === 'Open' || r.status === 'Overdue');
  const closed = all.filter(r => r.status === 'Closed');
  const critOpen = all.filter(r => (r.status === 'Open' || r.status === 'Overdue') && r.priority === 'Critical');
  const costYes = all.filter(r => r.costImp === 'Yes');
  const schedYes = all.filter(r => r.schedImp === 'Yes');

  document.getElementById('stat-strip').innerHTML = [
    {label:'Total RFIs', value: all.length, cls:''},
    {label:'Open', value: open.length, cls:'amber'},
    {label:'Closed', value: closed.length, cls:'green'},
    {label:'Critical Open', value: critOpen.length, cls:'red'},
    {label:'Cost Impact', value: costYes.length, cls:'amber'},
    {label:'Schedule Impact', value: schedYes.length, cls:'red'},
  ].map(s => `<div class="stat-card">
    <div class="label">${s.label}</div>
    <div class="value ${s.cls}">${s.value}</div>
  </div>`).join('');

  const projColors = {
    "Berkshire Iron Point": "blue",
    "BMR-PRC Newark": "green",
    "AMLI Via Marina (MDR)": "amber",
    "AMLI Broadway (Long Beach)": "purple"
  };
  document.getElementById('project-cards').innerHTML = Object.keys(PROJECT_META).map(p => {
    const pr = all.filter(r => r.project === p);
    const po = pr.filter(r => r.status === 'Open' || r.status === 'Overdue').length;
    const pc = pr.filter(r => r.status === 'Closed').length;
    const pcrit = pr.filter(r => (r.status === 'Open' || r.status === 'Overdue') && r.priority === 'Critical').length;
    const color = projColors[p] || 'blue';
    return `<div class="project-card ${color}" onclick="filterToProject('${p}')">
      <div class="project-card-name">${p}</div>
      <div class="project-card-short">${PROJECT_META[p].short}</div>
      <div class="project-card-stats">
        <div class="project-stat"><div class="n amber">${po}</div><div class="l">Open</div></div>
        <div class="project-stat"><div class="n green">${pc}</div><div class="l">Closed</div></div>
        <div class="project-stat"><div class="n red">${pcrit}</div><div class="l">Critical</div></div>
      </div>
    </div>`;
  }).join('');

  // NEM risk
  const nemItems = all.filter(r => (r.status === 'Open' || r.status === 'Overdue') && r.schedImp === 'Yes');
  document.getElementById('nem-count-badge').textContent = nemItems.length;
  document.getElementById('nem-risk-list').innerHTML = nemItems.length === 0
    ? `<div class="empty-state"><div class="empty-state-text">No open schedule-impact items</div></div>`
    : nemItems.slice(0, 8).map(r => `
    <div class="bic-row" onclick="openDrawer('${r.id}')" style="cursor:pointer;">
      <div style="flex:1;min-width:0;">
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-400);">${r.project.split(' ')[0]} · ${r.num}${r.rev==='Rev'?' (Rev)':''}</div>
        <div style="font-size:12px;font-weight:500;color:var(--midnight);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.subject}</div>
      </div>
      <span class="badge badge-nem">NEM</span>
      ${statusBadge(r.status)}
    </div>`).join('');

  // BIC leaderboard
  const bicCount = {};
  all.filter(r => r.status !== 'Closed').forEach(r => {
    const org = r.bic.split(' /')[0].split(' -')[0].trim();
    bicCount[org] = (bicCount[org] || 0) + 1;
  });
  const bicSorted = Object.entries(bicCount).sort((a,b) => b[1]-a[1]);
  const maxBic = bicSorted[0]?.[1] || 1;
  document.getElementById('bic-leaderboard').innerHTML = bicSorted.length === 0
    ? `<div class="empty-state"><div class="empty-state-text">No open items</div></div>`
    : bicSorted.map(([org, n]) => `
    <div class="bic-row">
      <div class="bic-avatar">${initials(org)}</div>
      <div class="bic-org">${org}</div>
      <div class="bic-bar-wrap"><div class="bic-bar" style="width:${Math.round(n/maxBic*100)}%"></div></div>
      <div class="bic-count">${n}</div>
    </div>`).join('');
}

function filterToProject(p) {
  showView('list');
  document.getElementById('f-project').value = p;
  renderTable();
}

// ── Table ─────────────────────────────────────────────────────────────────────
function renderTable() {
  const rows = filteredData();
  document.getElementById('list-count').textContent = `${rows.length} RFIs`;
  const tbody = document.getElementById('rfi-tbody');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No RFIs match your filters</div><div class="empty-state-sub">Try clearing filters or adding a new RFI</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const do_ = daysOpen(r);
    const doClass = do_ === null ? '' : do_ > 14 ? 'alert' : do_ > 7 ? 'warn' : 'ok';
    const isCrit = r.priority === 'Critical';
    const isOver = r.status === 'Overdue';
    const rowCls = isOver ? 'overdue-row' : isCrit ? 'critical-row' : '';
    const selCls = r.id === selectedId ? 'selected' : '';
    return `<tr class="${rowCls} ${selCls}" onclick="openDrawer('${r.id}')">
      <td><div class="rfi-num">${r.num}</div>${r.rev==='Rev'?`<span class="rfi-rev">Rev</span>`:''}</td>
      <td><div class="rfi-project">${r.project}</div></td>
      <td><div class="rfi-title" title="${r.subject}">${r.subject}</div></td>
      <td style="font-size:12px;color:var(--gray-600)">${r.disc}</td>
      <td>${priBadge(r.priority)}</td>
      <td>${statusBadge(r.status)}</td>
      <td><div class="bic-cell"><div class="bic-cell-avatar">${initials(r.bic)}</div><div class="bic-cell-name">${r.bic}</div></div></td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-600)">${r.dateReq||'—'}</td>
      <td><span class="days-cell ${doClass}">${do_!==null?do_+'d':'—'}</span></td>
      <td style="white-space:nowrap;">
        ${r.schedImp==='Yes'?'<span class="badge badge-nem" style="font-size:9px;">SCHED</span> ':''}
        ${r.costImp==='Yes'?'<span class="badge badge-urgent" style="font-size:9px;">COST</span>':''}
      </td>
    </tr>`;
  }).join('');
}

function sortTable(f) {
  if (sortField === f) sortDir *= -1; else { sortField = f; sortDir = 1; }
  renderTable();
}

// ── Drawer ────────────────────────────────────────────────────────────────────
function openDrawer(id) {
  selectedId = id;
  const r = DATA.find(x => x.id === id);
  if (!r) return;
  autoOverdue(r);

  document.getElementById('drawer-header').innerHTML = `
    <div class="drawer-header-top">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
          <span class="drawer-rfi-num">RFI-${r.num}</span>
          ${r.rev==='Rev'?`<span style="background:rgba(255,255,255,0.15);color:var(--dawn);font-size:11px;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;">REV</span>`:''}
          ${statusBadge(r.status)}
          ${priBadge(r.priority)}
          ${r.schedImp==='Yes'?'<span class="badge badge-nem">NEM RISK</span>':''}
        </div>
        <div class="drawer-title">${r.subject}</div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-meta">
      <span class="drawer-project">${r.project}</span>
      <span style="color:var(--midnight-60);">·</span>
      <span class="drawer-project">${r.site || '—'}</span>
      <span style="color:var(--midnight-60);">·</span>
      <span class="drawer-project">${r.disc}</span>
    </div>`;

  const do_ = daysOpen(r);

  document.getElementById('drawer-body').innerHTML = `
    <!-- Responsibility -->
    <div class="drawer-section">
      <div class="section-label">Accountability</div>
      <div class="bic-block">
        <div class="bic-block-avatar">${initials(r.bic)}</div>
        <div>
          <div class="bic-block-label">Ball in Court</div>
          <div class="bic-block-name">${r.bic.split('/')[0].trim()}</div>
          <div class="bic-block-person">${r.bic.includes('/')? r.bic.split('/').slice(1).join('/').trim() : ''}</div>
        </div>
      </div>
      <div class="fields-grid">
        <div class="field"><div class="field-label">Submitted By</div><div class="field-value">${r.submittedBy||'—'}</div></div>
        <div class="field"><div class="field-label">Directed To</div><div class="field-value">${r.directedTo||'—'}</div></div>
        <div class="field"><div class="field-label">Date Submitted</div><div class="field-value mono">${r.dateSub||'—'}</div></div>
        <div class="field"><div class="field-label">Date Required</div><div class="field-value mono ${r.dateReq&&r.dateReq!=='ASAP'&&!r.dateResp&&new Date(r.dateReq)<new Date()?'' :''}">${r.dateReq||'—'}</div></div>
        <div class="field"><div class="field-label">Date Responded</div><div class="field-value mono">${r.dateResp||'Pending'}</div></div>
        <div class="field"><div class="field-label">Days Open</div><div class="field-value mono ${do_>14?'':''}${do_===null?'muted':''}">${do_!==null?do_+' days':'—'}</div></div>
      </div>
    </div>
    <!-- Timeline -->
    <div class="drawer-section">
      <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;">
        Resolution Timeline
        <button class="add-update-btn" id="add-update-btn" onclick="toggleUpdateForm('${r.id}')">+ Add Update</button>
      </div>
      <div class="timeline" id="timeline-${r.id}">
        ${renderTimeline(r)}
      </div>
      <div class="update-form" id="update-form-${r.id}">
        <div class="form-row">
          <select id="uf-action"><option>Submitted</option><option>Under Review</option><option>Information Provided</option><option>Response Issued</option><option>Revision Required</option><option>Escalated</option><option>Closed</option><option>Voided</option></select>
          <input type="text" id="uf-actor" placeholder="Your name / org">
        </div>
        <textarea id="uf-note" placeholder="Describe the update or action taken…"></textarea>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="submitUpdate('${r.id}')">Add to Timeline</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleUpdateForm('${r.id}')">Cancel</button>
        </div>
      </div>
    </div>
    <!-- Content -->
    <div class="drawer-section">
      <div class="section-label">Problem Description</div>
      <div class="content-block-text ${!r.problem?'empty':''}">${r.problem||'No description provided.'}</div>
    </div>
    <div class="drawer-section">
      <div class="section-label">Proposed Resolution / Response</div>
      <div class="content-block-text ${!r.resolution?'empty':''}">${r.resolution||'No response yet.'}</div>
    </div>
    <!-- Impacts -->
    <div class="drawer-section">
      <div class="section-label">Impact Summary</div>
      <div class="fields-grid" style="margin-bottom:12px;">
        <div class="field"><div class="field-label">Plan Revision</div>${impBadge(r.planRev,'cost')}</div>
        <div class="field"><div class="field-label">Drawing / Spec</div><div class="field-value mono">${r.drawRef||'—'}</div></div>
      </div>
      <div class="impact-badges">
        <div><div class="field-label" style="font-size:10px;margin-bottom:3px;">Cost Impact</div>${impBadge(r.costImp,'cost')}</div>
        <div><div class="field-label" style="font-size:10px;margin-bottom:3px;">Schedule Impact</div>${impBadge(r.schedImp,'sched')}</div>
      </div>
    </div>`;

  document.getElementById('drawer-footer').innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="openEditModal('${r.id}')">✎ Edit</button>
    <button class="btn btn-ghost btn-sm" onclick="quickStatus('${r.id}','Closed')" ${r.status==='Closed'?'disabled':''}>✓ Close RFI</button>
    <button class="btn btn-ghost btn-sm" onclick="reassignBIC('${r.id}')">↔ Reassign BIC</button>
    <div style="flex:1"></div>
    <button class="btn btn-ghost btn-sm" style="color:var(--gray-400)" onclick="closeDrawer()">Close Panel</button>`;

  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  renderTable();
}

function renderTimeline(r) {
  if (!r.timeline || r.timeline.length === 0)
    return `<div style="color:var(--gray-400);font-size:12px;">No activity logged.</div>`;
  return r.timeline.map((t, i) => {
    const isLast = i === r.timeline.length - 1;
    const dotCls = t.action === 'Closed' ? 'closed' : t.action === 'Submitted' ? 'submitted' : t.action === 'Revised' ? 'revised' : t.action === 'Escalated' ? 'escalated' : '';
    return `<div class="timeline-item">
      <div class="timeline-left">
        <div class="timeline-dot ${dotCls}"></div>
        ${!isLast ? '<div class="timeline-line"></div>' : ''}
      </div>
      <div class="timeline-content">
        <div class="timeline-header">
          <span class="timeline-action">${t.action}</span>
          <span class="timeline-actor">· ${t.actor}</span>
          <span class="timeline-date">${t.date}</span>
        </div>
        <div class="timeline-note">${t.note}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleUpdateForm(id) {
  const f = document.getElementById('update-form-' + id);
  f.classList.toggle('open');
}

function submitUpdate(id) {
  const action = document.getElementById('uf-action').value;
  const actor = document.getElementById('uf-actor').value || 'Unknown';
  const note = document.getElementById('uf-note').value;
  if (!note) { showToast('Add a note before saving.'); return; }
  const r = DATA.find(x => x.id === id);
  if (!r.timeline) r.timeline = [];
  r.timeline.push({ date: new Date().toISOString().slice(0,10), actor, action, note });
  if (action === 'Closed') { r.status = 'Closed'; r.dateResp = new Date().toISOString().slice(0,10); }
  if (action === 'Response Issued') { r.status = 'Closed'; r.dateResp = new Date().toISOString().slice(0,10); }
  save();
  openDrawer(id);
  showToast('Update added to timeline');
}

function quickStatus(id, status) {
  const r = DATA.find(x => x.id === id);
  r.status = status;
  if (status === 'Closed') r.dateResp = new Date().toISOString().slice(0,10);
  if (!r.timeline) r.timeline = [];
  r.timeline.push({ date: new Date().toISOString().slice(0,10), actor: 'System', action: 'Closed', note: 'Marked closed via action button.' });
  save();
  openDrawer(id);
  showToast('RFI marked as ' + status);
}

function reassignBIC(id) {
  const r = DATA.find(x => x.id === id);
  const newBIC = prompt('Reassign Ball in Court to:', r.bic);
  if (newBIC && newBIC !== r.bic) {
    const old = r.bic;
    r.bic = newBIC;
    if (!r.timeline) r.timeline = [];
    r.timeline.push({ date: new Date().toISOString().slice(0,10), actor: 'System', action: 'Information Provided', note: `Ball in Court reassigned from ${old} to ${newBIC}.` });
    save();
    openDrawer(id);
    showToast('Ball in Court updated');
  }
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  selectedId = null;
  renderTable();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal() {
  editId = null;
  document.getElementById('modal-title').textContent = 'New RFI';
  ['m-num','m-site','m-bic','m-submittedBy','m-directedTo','m-dateSub','m-dateReq','m-subject','m-problem','m-resolution','m-drawRef'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m-rev').value = 'Orig';
  document.getElementById('m-project').value = '';
  document.getElementById('m-disc').value = 'Electrical';
  document.getElementById('m-priority').value = 'Standard';
  document.getElementById('m-status').value = 'Open';
  document.getElementById('m-planRev').value = 'No';
  document.getElementById('m-costImp').value = 'No';
  document.getElementById('m-schedImp').value = 'No';
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(id) {
  const r = DATA.find(x => x.id === id);
  editId = id;
  document.getElementById('modal-title').textContent = 'Edit RFI';
  document.getElementById('m-num').value = r.num;
  document.getElementById('m-rev').value = r.rev;
  document.getElementById('m-project').value = r.project;
  document.getElementById('m-site').value = r.site;
  document.getElementById('m-disc').value = r.disc;
  document.getElementById('m-priority').value = r.priority;
  document.getElementById('m-status').value = r.status;
  document.getElementById('m-bic').value = r.bic;
  document.getElementById('m-submittedBy').value = r.submittedBy;
  document.getElementById('m-directedTo').value = r.directedTo;
  document.getElementById('m-dateSub').value = r.dateSub;
  document.getElementById('m-dateReq').value = (r.dateReq === 'ASAP' ? '' : r.dateReq) || '';
  document.getElementById('m-subject').value = r.subject;
  document.getElementById('m-problem').value = r.problem;
  document.getElementById('m-resolution').value = r.resolution;
  document.getElementById('m-planRev').value = r.planRev;
  document.getElementById('m-costImp').value = r.costImp;
  document.getElementById('m-schedImp').value = r.schedImp;
  document.getElementById('m-drawRef').value = r.drawRef;
  document.getElementById('modal-overlay').classList.add('open');
}

function saveRFI() {
  const num = document.getElementById('m-num').value.trim();
  const project = document.getElementById('m-project').value;
  const bic = document.getElementById('m-bic').value.trim();
  const subject = document.getElementById('m-subject').value.trim();
  let valid = true;
  ['m-num','m-project','m-bic','m-subject'].forEach(id => {
    const el = document.getElementById(id);
    const val = el.value.trim();
    if (!val) { el.classList.add('error'); valid = false; } else el.classList.remove('error');
  });
  if (!valid) { showToast('Please fill in required fields'); return; }

  const rfi = {
    id: editId || `${project.split(' ')[0].substring(0,3).toUpperCase()}-${num}-${document.getElementById('m-rev').value}`,
    num, rev: document.getElementById('m-rev').value,
    project, site: document.getElementById('m-site').value,
    disc: document.getElementById('m-disc').value,
    priority: document.getElementById('m-priority').value,
    status: document.getElementById('m-status').value,
    bic, submittedBy: document.getElementById('m-submittedBy').value,
    directedTo: document.getElementById('m-directedTo').value,
    dateSub: document.getElementById('m-dateSub').value,
    dateReq: document.getElementById('m-dateReq').value,
    dateResp: '', subject,
    problem: document.getElementById('m-problem').value,
    resolution: document.getElementById('m-resolution').value,
    planRev: document.getElementById('m-planRev').value,
    costImp: document.getElementById('m-costImp').value,
    schedImp: document.getElementById('m-schedImp').value,
    drawRef: document.getElementById('m-drawRef').value,
    timeline: [{ date: new Date().toISOString().slice(0,10), actor: bic, action: 'Submitted', note: subject }]
  };

  if (editId) {
    const idx = DATA.findIndex(x => x.id === editId);
    rfi.timeline = DATA[idx].timeline;
    DATA[idx] = rfi;
  } else {
    DATA.push(rfi);
  }
  save();
  closeModal();
  renderTable();
  renderDashboard();
  showToast(editId ? 'RFI updated' : 'New RFI added');
  if (editId) openDrawer(rfi.id);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ── Export ────────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = filteredData();
  const cols = ['num','rev','project','site','disc','priority','status','bic','submittedBy','directedTo','dateSub','dateReq','dateResp','subject','problem','resolution','planRev','costImp','schedImp','drawRef'];
  const header = 'RFI #,Rev,Project,Site,Discipline,Priority,Status,Ball in Court,Submitted By,Directed To,Date Sub,Date Req,Date Resp,Subject,Problem,Resolution,Plan Rev,Cost Impact,Sched Impact,Drawing Ref';
  const csv = [header, ...rows.map(r => cols.map(c => `"${(r[c]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'Coast_Energy_RFI_Export.csv';
  a.click();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDrawer(); closeModal(); }
  if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) {
    e.preventDefault();
    showView('list');
    document.getElementById('search').focus();
  }
  if (e.key === 'n' && !['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) {
    e.preventDefault(); openModal();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  // NEM countdown
  const days = nem();
  const el = document.getElementById('countdown-val');
  el.textContent = days;
  if (days <= 14) el.classList.add('urgent');

  renderDashboard();
}

init();
</script>
</body>
</html>
